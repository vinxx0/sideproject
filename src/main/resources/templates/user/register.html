<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common/header :: head}"></head>

<body>
<nav th:replace="~{common/header :: header}"></nav>

<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 85vh;">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-5">
                    <h3 class="card-title text-center mb-4 fw-bold">🐾 회원가입</h3>

                    <form th:action="@{/user/register}" th:object="${userDto}" method="post">

                        <!-- 이름 -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">이름</label>
                            <input type="text" class="form-control" th:field="*{name}" placeholder="이름을 입력해주세요">
                            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <!-- 이메일 -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">이메일</label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="이메일을 입력해주세요">
                            <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <!-- 비밀번호 -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">비밀번호</label>
                            <input type="password" class="form-control" th:field="*{password}" placeholder="비밀번호를 입력해주세요">
                            <div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary">회원가입</button>
                        </div>

                        <div class="text-center mt-3">
                            <span class="text-muted small">이미 계정이 있으신가요?</span>
                            <a th:href="@{/auth/login}" class="small">로그인</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{common/footer :: footer}"></footer>
</body>
</html>
