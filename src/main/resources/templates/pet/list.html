<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common/header :: head}"></head>

<body>
<nav th:replace="~{common/header :: header}"></nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold">🐾 내 반려동물</h4>
        <a th:href="@{/pet/register}" class="btn btn-primary">반려동물 등록</a>
    </div>

    <!-- 반려동물 없을 때 -->
    <div th:if="${#lists.isEmpty(pets)}" class="text-center py-5">
        <p class="text-muted">아직 등록된 반려동물이 없어요🐾</p>
        <a th:href="@{/pet/register}" class="btn btn-primary">첫 반려동물 등록하기</a>
    </div>

    <!-- 반려동물 목록 -->
    <div class="row" th:unless="${#lists.isEmpty(pets)}">
        <div class="col-md-4 mb-4" th:each="pet : ${pets}">
            <div class="card shadow-sm h-100">
                <!-- 프로필 사진 -->
                <img th:if="${pet.profileImageUrl != null}"
                     th:src="${pet.profileImageUrl}"
                     class="card-img-top"
                     style="height: 200px; object-fit: cover; border-radius: 16px 16px 0 0;">
                <img th:unless="${pet.profileImageUrl != null}"
                     src="https://via.placeholder.com/300x200?text=🐾"
                     class="card-img-top"
                     style="height: 200px; object-fit: cover; border-radius: 16px 16px 0 0;">

                <div class="card-body">
                    <h5 class="card-title fw-bold" th:text="${pet.name}">반려동물 이름</h5>
                    <p class="card-text text-muted mb-1">
                        <span th:text="${pet.species}">종</span>
                        <span th:if="${pet.breed != null}"> · <span th:text="${pet.breed}">품종</span></span>
                    </p>
                    <p class="card-text text-muted small">
                        <span th:text="${pet.gender == T(com.example.sideproject.common.Gender).MALE ? '수컷' : '암컷'}"></span>
                    </p>
                </div>
                <div class="card-footer bg-white border-0 pb-3">
                    <a th:href="@{/pet/{id}(id=${pet.id})}" class="btn btn-outline-secondary btn-sm w-100">상세보기</a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{common/footer :: footer}"></footer>
</body>
</html>
