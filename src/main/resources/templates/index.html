<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common/header :: head}"></head>

<body>
<nav th:replace="~{common/header :: header}"></nav>

<div class="container mt-5">

    <!-- 환영 메시지 -->
    <div class="mb-5 text-center">
        <h3 class="fw-bold">🐾 안녕하세요!</h3>
        <p class="text-muted">오늘도 반려동물과 함께하는 하루를 기록해봐요💚</p>
    </div>

    <!-- 다가오는 일정 -->
    <div class="mb-5" th:if="${!#lists.isEmpty(upcomingSchedules)}">
        <h5 class="fw-bold mb-3">🔔 다가오는 일정</h5>
        <div class="row">
            <div class="col-md-4 mb-3" th:each="schedule : ${upcomingSchedules}">
                <div class="card shadow-sm h-100" style="border-left: 4px solid #4A7C59;">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="fw-semibold" th:text="${schedule.title}"></span>
                            <span class="badge"
                                  style="background-color: #4A7C59;"
                                  th:text="'D-' + ${#temporals.daysBetween(#temporals.createNow(), schedule.scheduledDate)}">
                            </span>
                        </div>
                        <p class="text-muted small mb-1 mt-1"
                           th:text="${schedule.type == T(com.example.sideproject.common.ScheduleType).VACCINE ? '💉 예방접종' :
                                      schedule.type == T(com.example.sideproject.common.ScheduleType).CHECKUP ? '🏥 검진' : '📌 기타'}">
                        </p>
                        <p class="text-muted small mb-0"
                           th:text="${#temporals.format(schedule.scheduledDate, 'yyyy년 MM월 dd일')}">
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 반려동물 목록 -->
    <div>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold">🐾 내 반려동물</h5>
        </div>

        <!-- 반려동물 없을 때 -->
        <div th:if="${#lists.isEmpty(pets)}" class="text-center py-5">
            <p class="text-muted">아직 등록된 반려동물이 없어요 🐾</p>
            <a th:href="@{/pet/register}" class="btn btn-primary">첫 반려동물 등록하기</a>
        </div>

        <!-- 반려동물 카드 목록 -->
        <div class="row" th:unless="${#lists.isEmpty(pets)}">
            <div class="col-md-3 mb-4" th:each="pet : ${pets}">
                <div class="card shadow-sm h-100">
                    <img th:if="${pet.profileImageUrl != null}"
                         th:src="${pet.profileImageUrl}"
                         class="card-img-top"
                         style="height: 150px; object-fit: cover; border-radius: 16px 16px 0 0;">
                    <img th:unless="${pet.profileImageUrl != null}"
                         src="https://via.placeholder.com/300x150?text=🐾"
                         class="card-img-top"
                         style="height: 150px; object-fit: cover; border-radius: 16px 16px 0 0;">
                    <div class="card-body text-center">
                        <h6 class="fw-bold" th:text="${pet.name}"></h6>
                        <p class="text-muted small mb-2" th:text="${pet.species}"></p>
                        <div class="d-flex gap-1 justify-content-center">
                            <a th:href="@{/pet/{id}(id=${pet.id})}"
                               class="btn btn-outline-secondary btn-sm">프로필</a>
                            <a th:href="@{/carelog/list/{id}(id=${pet.id})}"
                               class="btn btn-outline-secondary btn-sm">기록</a>
                            <a th:href="@{/schedule/list/{id}(id=${pet.id})}"
                               class="btn btn-outline-secondary btn-sm">일정</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div style="min-height: 20vh;"></div>

<footer th:replace="~{common/footer :: footer}"></footer>
</body>
</html>
