<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common/header :: head}"></head>

<body>
<nav th:replace="~{common/header :: header}"></nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold">📅 일정 관리</h4>
        <a th:href="@{/schedule/register/{petId}(petId=${petId})}" class="btn btn-primary">+ 일정 추가</a>
    </div>

    <!-- 다가오는 일정 -->
    <div class="card shadow-sm mb-4" th:if="${!#lists.isEmpty(upcoming)}">
        <div class="card-body">
            <h5 class="fw-bold mb-3">🔔 다가오는 일정 (30일 이내)</h5>
            <div th:each="schedule : ${upcoming}">
                <div class="d-flex justify-content-between align-items-center p-2 mb-2 rounded"
                     style="background-color: #EDE8DC;">
                    <div>
                        <span class="fw-semibold" th:text="${schedule.title}"></span>
                        <span class="text-muted small ms-2"
                              th:text="${schedule.type == T(com.example.sideproject.common.ScheduleType).VACCINE ? '💉 예방접종' :
                                         schedule.type == T(com.example.sideproject.common.ScheduleType).CHECKUP ? '🏥 검진' : '📌 기타'}">
                        </span>
                    </div>
                    <span class="badge"
                          style="background-color: #4A7C59;"
                          th:text="'D-' + ${dDayMap[schedule.id]}">
                    </span>
                </div>
            </div>
        </div>
    </div>

    <!-- 탭 -->
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link active" id="pending-tab" href="#" onclick="showTab('pending')">📌 예정</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" id="completed-tab" href="#" onclick="showTab('completed')">✅ 완료</a>
        </li>
    </ul>

    <!-- 예정 일정 목록 -->
    <div id="pending">
        <div th:if="${#lists.isEmpty(schedules.?[completed == false])}" class="text-center py-5">
            <p class="text-muted">예정된 일정이 없어요 📅</p>
            <a th:href="@{/schedule/register/{petId}(petId=${petId})}" class="btn btn-primary">첫 일정 등록하기</a>
        </div>

        <div th:each="schedule : ${schedules}" th:if="${!schedule.completed}">
            <div class="card shadow-sm mb-3">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <span class="badge me-2" style="background-color: #4A7C59;">예정</span>
                        <span class="fw-semibold" th:text="${schedule.title}"></span>
                        <span class="text-muted small ms-2"
                              th:text="${schedule.type == T(com.example.sideproject.common.ScheduleType).VACCINE ? '💉 예방접종' :
                                         schedule.type == T(com.example.sideproject.common.ScheduleType).CHECKUP ? '🏥 검진' : '📌 기타'}">
                        </span>
                        <span class="text-muted small ms-2"
                              th:text="${#temporals.format(schedule.scheduledDate, 'yyyy.MM.dd')}">
                        </span>
                        <span th:if="${schedule.repeating}" class="text-muted small ms-1">🔁 매년 반복</span>
                    </div>
                    <div class="d-flex gap-2">
                        <form th:action="@{/schedule/{id}/complete(id=${schedule.id})}" method="post">
                            <button type="submit" class="btn btn-outline-secondary btn-sm">✅ 완료</button>
                        </form>
                        <a th:href="@{/schedule/{id}/edit(id=${schedule.id})}"
                           class="btn btn-outline-secondary btn-sm">수정</a>
                        <form th:action="@{/schedule/{id}/delete(id=${schedule.id})}" method="post"
                              onsubmit="return confirm('정말 삭제하시겠습니까?')">
                            <button type="submit" class="btn btn-outline-danger btn-sm">삭제</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 완료된 일정 목록 -->
    <div id="completed" style="display:none;">
        <div th:if="${#lists.isEmpty(schedules.?[completed == true])}" class="text-center py-5">
            <p class="text-muted">완료된 일정이 없어요 ✅</p>
        </div>

        <div th:each="schedule : ${schedules}" th:if="${schedule.completed}">
            <div class="card shadow-sm mb-3" style="opacity: 0.7;">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <span class="badge bg-secondary me-2">완료</span>
                        <span class="fw-semibold text-decoration-line-through" th:text="${schedule.title}"></span>
                        <span class="text-muted small ms-2"
                              th:text="${schedule.type == T(com.example.sideproject.common.ScheduleType).VACCINE ? '💉 예방접종' :
                                         schedule.type == T(com.example.sideproject.common.ScheduleType).CHECKUP ? '🏥 검진' : '📌 기타'}">
                        </span>
                        <span class="text-muted small ms-2"
                              th:text="${#temporals.format(schedule.scheduledDate, 'yyyy.MM.dd')}">
                        </span>
                    </div>
                    <div class="d-flex gap-2">
                        <form th:action="@{/schedule/{id}/delete(id=${schedule.id})}" method="post"
                              onsubmit="return confirm('정말 삭제하시겠습니까?')">
                            <button type="submit" class="btn btn-outline-danger btn-sm">삭제</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div style="min-height: 30vh;"></div>

<script>
    function showTab(tab) {
        document.getElementById('pending').style.display = tab === 'pending' ? 'block' : 'none';
        document.getElementById('completed').style.display = tab === 'completed' ? 'block' : 'none';
        document.getElementById('pending-tab').classList.toggle('active', tab === 'pending');
        document.getElementById('completed-tab').classList.toggle('active', tab === 'completed');
    }
</script>

<footer th:replace="~{common/footer :: footer}"></footer>
</body>
</html>
