<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common/header :: head}"></head>

<body>
<nav th:replace="~{common/header :: header}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-5">
                    <h4 class="fw-bold text-center mb-4">📋 돌봄 기록 등록</h4>

                    <form th:action="@{/carelog/register/{petId}(petId=${petId})}"
                          th:object="${careLogDto}"
                          method="post" enctype="multipart/form-data">

                        <!-- 기록 유형 -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">기록 유형</label>
                            <div class="d-flex gap-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{type}" value="WALK" id="walk">
                                    <label class="form-check-label" for="walk">🦮 산책</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{type}" value="FEED" id="feed">
                                    <label class="form-check-label" for="feed">🍚 급식</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{type}" value="POOP" id="poop">
                                    <label class="form-check-label" for="poop">💩 배변</label>
                                </div>
                            </div>
                            <div class="text-danger small" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
                        </div>

                        <!-- 날짜 -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">날짜</label>
                            <input type="date" class="form-control" th:field="*{date}">
                            <div class="text-danger small" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
                        </div>

                        <!-- 시간 -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">시간</label>
                            <input type="time" class="form-control" th:field="*{time}">
                        </div>

                        <!-- 메모 -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">메모</label>
                            <textarea class="form-control" th:field="*{memo}" rows="3" placeholder="메모를 입력해주세요"></textarea>
                        </div>

                        <!-- 사진 첨부 -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">사진 첨부</label>
                            <input type="file" class="form-control" name="images" 
                            accept="image/*" multiple> 
                            <small class="text-muted">* 최대 5장, 장당 10MB 이하</small>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary">기록 저장</button>
                        </div>

                        <div class="text-center mt-3">
                            <a th:href="@{/carelog/list/{petId}(petId=${petId})}" class="small text-muted">← 목록으로 돌아가기</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{common/footer :: footer}"></footer>
</body>
</html>
